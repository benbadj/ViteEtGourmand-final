<div class="container">
    <div class="main__container">
        <h1 class="main__container-text">Modifier votre mot de passe</h1>   
    </div>
    <form class="contact__form">
        <div class="mb-3">
            <label for="EmailInput" class="form-label">email</label>
            <input type="text" class="form-control" id="EmailInput" placeholder="Votre email"> 
        </div>
        <div class="mb-3">
            <label for="passwordInput" class="form-label">nouveau mot de passe</label>
            <input type="password" placeholder="Votre mot de passe" id="passwordInput" class="form-control">
            <div class="invalid-feedback">
                votre mot de passe doit contenir au moins 8 caractères, 1 chifre et 1 caractère spéciale
            </div>
        </div>
        <div class="mb-3">
            <label for="ValidatePasswordInput" class="form-label">Confirmez votre mot de passe</label>
            <input type="password" class="form-control" id="ValidatePasswordInput" name="PasswordConfirm">
            <div>
                votre mot de passe n'est pas valide
            </div>
        </div>
        <div class="text-center">
            <button type="submit" class="btn">Valider</button>
        </div>
    </form>
</div>
