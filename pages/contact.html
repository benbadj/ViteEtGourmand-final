<section class="contact__section">
        <div class="contact__tittle">
            <h1 class="contact__headtitle">Contactez-nous</h1>
            <p class="contact__description">Vous avez des questions, des commentaires ou souhaitez simplement en savoir plus sur Vite et Gourmand ? N'hésitez pas à nous contacter ! Nous sommes là pour vous aider.</p>   
        </div>
        <form action="" method="post" class="contact__form">
            <input type="text" placeholder="Votre nom" class="contact__input"/>
            <input type="email" placeholder="Votre email" class="contact__input"/>
            <input type="tel" placeholder="votre numero de téléphone" class="contact__input"/>
            <div class="form__group">
                <label for="statut">Vous êtes <span class="required"></span></label>
                <select name="statut" id="statut" required>
                    <option value="disabled selected">Vueillez selectionner</option>
                    <option value="agence">une agence</option>
                    <option value="entreprise">une entreprise</option>
                    <option value="restaurateur">un restaurateur privé</option>
                    <option value="weeding planner">organisateur d'évenement</option>
                    <option value="consultant">à votre compte</option>
                </select>
            </div>
            <input type="text" placeholder="Nom de votre entreprise" class="contact__input"/>
            <input type="number" placeholder="Code postale" class="contact__input"/>
            <textarea placeholder="Votre message" class="contact__input"></textarea>
            <button type="submit" class="btn__outline-success-contact">Envoyer</button>
        </form>
    </section>
