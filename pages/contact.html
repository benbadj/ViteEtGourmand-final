
<div class="container col-12">
    <div class="main__container">
        <h1 class="main__container-text">Contactez-nous</h1>
        <p class="about__us">Vous avez des questions, des commentaires ou souhaitez simplement en savoir plus sur Vite et Gourmand ? N'hésitez pas à nous contacter ! Nous sommes là pour vous aider.</p>   
    </div>
    <form action="" method="post" class="contact__form">
        <div class="mb-3">
            <label for="NomInput" class="form-label">Nom</label>
            <input type="text" class="form-control" id="nomImput" placeholder="Votre nom" value="John" name="Nom"> 
        </div>
        <div class="mb-3">
            <label for="PrenomInput" class="form-label">Prénom</label>
            <input type="text" class="form-control" id="prenomImput" placeholder="Votre prénom" value="Doe" name="Prenom"> 
        </div>
        <div class="mb-3">
          <label for="EmailImput" class="form-label">Email</label>
          <input type="email" class="form-control" id="emailImput" placeholder="test@mail.fr" name="Email">
          <div class="invalid-feedback">
            votre mail n'est pas dans le bon format
          </div> 
        </div>
        <div class="mb-3">
          <label for="NumberImput" class="form-label">Numero de telephone</label>
          <input type="email" class="form-control" id="numberImput" placeholder="00 00 00 00 00" name="numero de téléphone">
          <div class="invalid-feedback">
            taper sans l'indictaif
          </div> 
        </div>
        <textarea placeholder="Votre message" id="postImput" class="form-control"></textarea>
        <button type="submit" class="btn" id="btn-validation">Envoyer</button>
    </form>
</div>
