
<div class="container col-12">
    <div class="main__container">
        <h1 class="main__container-text">Contactez-nous</h1>
        <p class="about__us">Vous avez des questions, des commentaires ou souhaitez simplement en savoir plus sur Vite et Gourmand ? N'hésitez pas à nous contacter ! Nous sommes là pour vous aider.</p>   
    </div>
    <form action="" method="post" class="contact__form">
        <div class="mb-3">
            <label for="NomInput" class="form-label">Nom</label>
            <input type="text" class="form-control" id="NomInput" placeholder="Votre nom" value="John" name="Nom"> 
        </div>
        <div class="mb-3">
            <label for="PrenomInput" class="form-label">Prénom</label>
            <input type="text" class="form-control id="PrenomInput" placeholder="Votre prénom" value="Doe" name="Prenom"> 
        </div>
        <div class="form__group">
            <label for="statut">Vous êtes <span class="required"></span></label>
            <select name="statut" id="statut" required>
                <option value="disabled selected">Vueillez selectionner</option>
                <option value="agence">une agence</option>
                <option value="entreprise">une entreprise</option>
                <option value="restaurateur">un restaurateur privé</option>
                <option value="weeding planner">organisateur d'évenement</option>
                <option value="consultant">à votre compte</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="NomInput" class="form-label">NomEntreprise</label>
            <input type="text" class="form-control" id="NomInput" placeholder="Nom de votre entreprise"> 
        </div>
        <div class="mb-3">
            <label for="Number" class="form-label">Code postale</label>
            <input type="texte" class="form-control" id="numberInput" placeholder="code postale"> 
        </div>
        <textarea placeholder="Votre message" class="form-control"></textarea>
        <button type="submit" class="btn">Envoyer</button>
    </form>
</div>
